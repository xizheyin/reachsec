name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-08-09

      - name: Check root formatting (cargo fmt)
        run: cargo fmt --all -- --check

      - name: Check root linting (cargo clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run root tests (cargo test)
        run: cargo test --all-features --all-targets -- --nocapture

      - name: Check callgraph4rs formatting (cargo fmt)
        working-directory: callgraph4rs
        run: cargo fmt --all -- --check

      - name: Run callgraph4rs tests (cargo test)
        working-directory: callgraph4rs
        run: cargo test --all-targets -- --nocapture

      - name: Install call-cg4rs
        working-directory: callgraph4rs
        run: cargo install --path . --force

      - name: Smoke test reachsec
        run: ./target/debug/reachsec --help
